<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #fff;
        }
        #paddle {
            position: absolute;
            width: 10px;
            height: 100px;
            background-color: #fff;
        }
        #ball {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
        }
        #settings-modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 20px;
        }
        .modal-content {
            background-color: #333;
            padding: 20px;
            border-radius: 5px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="paddle" style="left: 20px; top: 250px;"></div>
        <div id="ball" style="left: 395px; top: 295px;"></div>
    </div>
    <div id="settings-modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            <br><br>
            <button onclick="startGame()">Start Game</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
    <script>
        function closeModal() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function startGame() {
            closeModal();
            // Add game start logic here
        }

        function openModal() {
            document.getElementById('settings-modal').style.display = 'block';
        }

        // open the settings modal when the page loads
        window.onload = openModal;
    </script>
</body>
</html>
